<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jameson Bortnem Portfolio</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #1f1f1f;
      --muted: #5f5f5f;
      --accent: #0b5f75;
      --card: #ffffff;
      --border: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      margin-left: 20px;
      font-weight: bold;
    }

    .hero {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 40px 40px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      max-width: 700px;
      color: var(--muted);
      font-size: 18px;
    }

    .buttons {
      margin-top: 30px;
    }

    .buttons a {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 12px;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: white;
    }

    section {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 40px 60px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--muted);
      margin-bottom: 15px;
    }

    .card a {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
    }

    footer {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 40px 60px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .hero h1 {
        font-size: 34px;
      }

      nav {
        flex-direction: column;
        align-items: flex-start;
      }

      nav div {
        margin-top: 10px;
      }

      nav a {
        margin-left: 0;
        margin-right: 15px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <strong>Jameson Bortnem</strong>
      <div>
  <a href="#projects">Projects</a>
  <a href="#about">About</a>

  <a href="https://github.com/jamesonbortnem" target="_blank" rel="noopener noreferrer">GitHub</a>
</div>
